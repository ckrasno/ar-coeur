<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Test WebAR - Coeur sur Etiquette</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.001; filterBeta:0.1;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="modelCoeur" src="./coeur.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-gltf-model src="#modelCoeur" 
              position="0 0 0" 
              rotation="0 0 0" 
              scale="1.0 1.0 1.0">
			  </a-gltf-model>

        <a-text value="Coeur" 
                color="#ef2d5e" 
                align="center" 
                position="0 0.08 0" 
                scale="0.3 0.3 0.3">
                </a-text>

      </a-entity>
      
    </a-scene>
  </body>
</html>
